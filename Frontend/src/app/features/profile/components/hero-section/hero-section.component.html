<header class="relative w-full max-w-5xl mx-auto">
  <!-- Cover Image -->
  <div class="w-full h-48 md:h-64 lg:h-[300px] rounded-3xl overflow-hidden shadow-sm">
    <img src="https://i.pinimg.com/originals/18/66/c1/1866c184a7d1b635ad8c1c6268d86822.jpg" alt="Cover" class="w-full h-full object-cover">
  </div>

  <!-- Profile Info Area -->
  <div class="px-6 flex flex-col md:flex-row items-start md:items-end justify-between -mt-16 md:-mt-12 relative z-10 gap-4 md:gap-6 mb-4">
    
    <div class="flex flex-col md:flex-row items-start md:items-end gap-6">
      <!-- Avatar -->
      <div class="w-32 h-32 md:w-36 md:h-36 rounded-full border-4 border-[#f7f9fb] overflow-hidden bg-white dark:bg-slate-800 shadow-sm flex-shrink-0">
        <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=200&q=80" alt="Avatar" class="w-full h-full object-cover">
      </div>

      <!-- Name & Role -->
      <div class="pb-2">
        <h1 class="text-3xl font-black text-gray-900 dark:text-white tracking-tight">Alexandre Nzola</h1>
        <p class="text-gray-500 font-medium mt-1">&#64;alexnzola &bull; Digital Architect</p>
      </div>
    </div>

    <!-- Buttons -->
    <div class="flex items-center gap-3 pb-2 md:pb-4 w-full md:w-auto">
      <button  routerLink="/app/editar-perfil" class="flex-1 md:flex-none bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-700 text-gray-700 dark:text-slate-300 px-6 py-2 rounded-full font-semibold hover:bg-gray-50 dark:hover:bg-slate-700 transition-colors shadow-sm">
        Editar Perfil
      </button>
      <button class="bg-primary text-white p-2 rounded-full shadow-md hover:bg-blue-700 transition-colors">
        <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M7.217 10.907a2.25 2.25 0 1 0 0 2.186m0-2.186c.18.324.283.696.283 1.093s-.103.77-.283 1.093m0-2.186 9.566-5.314m-9.566 7.5 9.566 5.314m0 0a2.25 2.25 0 1 0 3.935 2.186 2.25 2.25 0 0 0-3.935-2.186Zm0-12.814a2.25 2.25 0 1 0 3.933-2.185 2.25 2.25 0 0 0-3.933 2.185Z" />
        </svg>
      </button>
    </div>

  </div>
</header>
