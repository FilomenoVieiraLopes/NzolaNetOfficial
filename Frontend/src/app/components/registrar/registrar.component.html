<nav class="fixed inset-x-0 top-0 z-50 border-b border-slate-200 dark:border-slate-700/60 bg-white dark:bg-slate-800/80 backdrop-blur-xl shadow-sm">
  <div class="mx-auto flex max-w-7xl items-center justify-between px-6 py-4 lg:px-8">
    <span class="text-lg font-bold text-blue-700">NzolaNet</span>
    <a routerLink="/login" class="text-sm font-medium text-slate-700 dark:text-slate-300 transition hover:text-blue-600">Entrar</a>
  </div>
</nav>

<main class="min-h-screen bg-gradient-to-b from-slate-50 to-white pt-32 pb-24 px-6">
  <div class="mx-auto max-w-2xl">
    <div class="mb-12 text-center">
      <h1 class="text-4xl font-bold tracking-tight text-slate-950 dark:text-white sm:text-5xl">Crie a sua conta</h1>
      <p class="mt-4 text-lg text-slate-600 dark:text-slate-300">Entre na NzolaNet para publicar, comentar, dar bazes e seguir outros utilizadores.</p>
    </div>

    <div class="rounded-3xl border border-slate-200 dark:border-slate-700/70 bg-white dark:bg-slate-800 p-8 shadow-[0_20px_50px_rgba(15,23,42,0.08)] sm:p-12">
      <div class="mb-10 flex flex-col items-center gap-4">
        <div class="relative group">
          <div class="flex h-32 w-32 items-center justify-center rounded-full border-2 border-dashed border-slate-300 bg-slate-100 group-hover:border-blue-600 transition-colors overflow-hidden cursor-pointer" (click)="triggerFileInput()">
            <img *ngIf="profileImage" [src]="profileImage" alt="Foto de perfil" class="w-full h-full object-cover" />
            <span *ngIf="!profileImage" class="material-symbols-outlined text-5xl text-slate-400">add_a_photo</span>
          </div>
          <input id="photoUpload" type="file" accept="image/*" (change)="onFileSelected($event)" class="hidden" />
        </div>
        <div class="text-center">
          <button type="button" (click)="triggerFileInput()" class="text-sm font-semibold text-blue-600 transition hover:underline">Adicionar foto de perfil</button>
          <p class="mt-1 text-xs text-slate-500 dark:text-slate-400">Opcional. Recomendado 800x800px, maximo 2MB.</p>
        </div>
      </div>

      <form (ngSubmit)="onSubmit()" class="space-y-6">
        <div>
          <label for="fullName" class="block text-sm font-medium text-slate-700 dark:text-slate-300">Nome completo</label>
          <input id="fullName" name="fullName" [(ngModel)]="fullName" type="text" placeholder="Ex: Emiliano Diamantino" class="mt-2 w-full rounded-xl border border-slate-300 bg-slate-50 dark:bg-slate-900 px-4 py-3 text-sm text-slate-900 dark:text-white outline-none transition focus:border-blue-600 focus:bg-white dark:focus:bg-slate-800 focus:ring-2 focus:ring-blue-100" required />
        </div>

        <div>
          <label for="bio" class="block text-sm font-medium text-slate-700 dark:text-slate-300">Bio <span class="text-slate-400">(opcional)</span></label>
          <input id="bio" name="bio" [(ngModel)]="bio" type="text" placeholder="Breve descricao sobre voce" class="mt-2 w-full rounded-xl border border-slate-300 bg-slate-50 dark:bg-slate-900 px-4 py-3 text-sm text-slate-900 dark:text-white outline-none transition focus:border-blue-600 focus:bg-white dark:focus:bg-slate-800 focus:ring-2 focus:ring-blue-100" />
        </div>

        <div>
          <label for="email" class="block text-sm font-medium text-slate-700 dark:text-slate-300">Email</label>
          <input id="email" name="email" [(ngModel)]="email" type="email" placeholder="nome@email.com" class="mt-2 w-full rounded-xl border border-slate-300 bg-slate-50 dark:bg-slate-900 px-4 py-3 text-sm text-slate-900 dark:text-white outline-none transition focus:border-blue-600 focus:bg-white dark:focus:bg-slate-800 focus:ring-2 focus:ring-blue-100" required />
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-slate-700 dark:text-slate-300">Palavra-passe</label>
          <input id="password" name="password" [(ngModel)]="password" type="password" placeholder="Minimo 6 caracteres" class="mt-2 w-full rounded-xl border border-slate-300 bg-slate-50 dark:bg-slate-900 px-4 py-3 text-sm text-slate-900 dark:text-white outline-none transition focus:border-blue-600 focus:bg-white dark:focus:bg-slate-800 focus:ring-2 focus:ring-blue-100" required />
        </div>

        <div class="flex items-start gap-3 pt-2">
          <input type="checkbox" id="terms" name="termsAccepted" [(ngModel)]="termsAccepted" class="mt-1 h-5 w-5 rounded border-slate-300 bg-white dark:bg-slate-800 text-blue-600 transition focus:ring-2 focus:ring-blue-100" />
          <label for="terms" class="text-xs text-slate-600 dark:text-slate-300 leading-relaxed">
            Aceito os termos de servico e a politica de privacidade da NzolaNet.
          </label>
        </div>

        <button type="submit" [disabled]="isLoading" class="w-full rounded-full bg-blue-600 px-6 py-3 text-base font-semibold text-white shadow-lg shadow-blue-600/20 transition hover:bg-blue-700 active:scale-[0.98] flex justify-center items-center gap-2 disabled:opacity-60">
          <span *ngIf="isLoading" class="border-2 border-white border-t-transparent w-5 h-5 rounded-full animate-spin"></span>
          Criar conta
        </button>
      </form>

      <div class="mt-8 text-center">
        <p class="text-sm text-slate-600 dark:text-slate-300">
          Ja tem conta?
          <a routerLink="/login" class="font-semibold text-blue-600 transition hover:underline">Entrar</a>
        </p>
      </div>
    </div>

    <footer class="mt-16 text-center text-sm text-slate-500">
      NzolaNet - rede social para publicacoes, bazes e comentarios.
    </footer>
  </div>
</main>
