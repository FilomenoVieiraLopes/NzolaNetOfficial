<div routerLink="/app/home" class="fixed inset-0 z-[100] bg-on-surface/40 dark:bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 cursor-pointer">
  <div (click)="$event.stopPropagation()" class="bg-surface-container-lowest dark:bg-slate-800 w-full max-w-[600px] rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.1)] flex flex-col overflow-hidden cursor-default">
    <div class="flex items-center justify-between px-6 py-4 border-b border-outline-variant dark:border-slate-700">
      <div class="flex items-center gap-3">
        <button routerLink="/app/home" class="p-2 -ml-2 hover:bg-surface-container-high dark:hover:bg-slate-700 rounded-full transition-all text-on-surface-variant">
          <span class="material-symbols-outlined">close</span>
        </button>
        <h2 class="font-h2 text-h2 text-on-surface dark:text-white font-bold">Criar publicacao</h2>
      </div>
    </div>

    <div class="px-6 py-6">
      <div class="flex items-center gap-4 mb-stack-md">
        <ng-container *ngIf="currentUser?.avatar_url; else avatarFallback">
          <img [alt]="currentUser?.name || 'Utilizador'" class="w-12 h-12 rounded-full object-cover" [src]="currentUser?.avatar_url">
        </ng-container>
        <ng-template #avatarFallback>
          <div class="w-12 h-12 rounded-full bg-primary/10 text-primary flex items-center justify-center flex-shrink-0">
            <span class="material-symbols-outlined text-[26px]">person</span>
          </div>
        </ng-template>
        <div>
          <p class="font-label-md text-label-md text-on-surface dark:text-white font-bold">{{ currentUser?.name || 'Utilizador' }}</p>
          <p class="font-label-sm text-label-sm text-on-surface-variant">Publicacao com texto, imagem ou video</p>
        </div>
      </div>

      <div class="mb-stack-md relative">
        <textarea [(ngModel)]="postText" class="w-full bg-transparent border-none focus:ring-0 text-body-lg text-on-surface dark:text-white placeholder:text-on-surface-variant/50 resize-none p-0 outline-none" placeholder="O que estas a pensar?" rows="4"></textarea>
        <div *ngIf="showEmojiPicker" class="absolute z-10 bottom-full left-0 mb-2 bg-surface-container-highest dark:bg-slate-700 rounded-xl shadow-lg border border-outline-variant p-2 w-[240px]">
          <div class="grid grid-cols-6 gap-2">
            <button *ngFor="let emoji of emojis" (click)="addEmoji(emoji)" class="text-xl hover:bg-surface-container-high p-1 rounded">{{ emoji }}</button>
          </div>
        </div>
      </div>

      <input type="file" #imageInput (change)="onFileSelected($event)" accept="image/*" class="hidden">
      <input type="file" #videoInput (change)="onFileSelected($event)" accept="video/*" class="hidden">

      <div class="relative group cursor-pointer" (click)="!selectedImage && triggerFileInput(videoInput)">
        <div *ngIf="!selectedImage" class="w-full aspect-[16/9] rounded-xl border-2 border-dashed border-outline-variant bg-surface-container-low flex flex-col items-center justify-center gap-3 hover:border-primary transition-all">
          <div class="w-12 h-12 rounded-full bg-surface-container-highest flex items-center justify-center">
            <span class="material-symbols-outlined text-primary">video_call</span>
          </div>
          <p class="font-label-md text-label-md text-on-surface-variant">Adicionar video</p>
        </div>
        <div *ngIf="selectedImage" class="relative w-full rounded-xl overflow-hidden bg-black flex justify-center items-center max-h-[400px]">
          <img *ngIf="selectedMediaType === 'image'" [src]="selectedImage" alt="Preview" class="w-full h-auto max-h-[400px] object-contain">
          <video *ngIf="selectedMediaType === 'video'" [src]="selectedImage" controls class="w-full h-auto max-h-[400px] object-contain"></video>
          <button (click)="removeImage(); $event.stopPropagation()" class="absolute top-2 right-2 bg-black/60 hover:bg-black/80 text-white rounded-full p-2">
            <span class="material-symbols-outlined text-[20px]">close</span>
          </button>
        </div>
      </div>
    </div>

    <div class="px-6 py-4 bg-surface-container-low/50 mt-auto border-t border-outline-variant">
      <div class="flex flex-wrap items-center justify-between gap-4">
        <div class="flex items-center gap-1 relative">
          <button (click)="triggerFileInput(imageInput)" class="p-2.5 rounded-full text-primary hover:bg-primary-fixed" title="Adicionar imagem">
            <span class="material-symbols-outlined">image</span>
          </button>
          <button (click)="toggleEmojiPicker()" class="p-2.5 rounded-full text-primary hover:bg-primary-fixed" title="Emoji">
            <span class="material-symbols-outlined">mood</span>
          </button>
        </div>
        <button (click)="publishPost()" [disabled]="isPublishing || (!postText.trim() && !selectedImage)" class="bg-primary text-on-primary px-8 py-2.5 rounded-full font-label-md text-label-md font-bold disabled:opacity-50">
          <span *ngIf="!isPublishing">Publicar</span>
          <span *ngIf="isPublishing" class="material-symbols-outlined animate-spin text-[20px]">progress_activity</span>
        </button>
      </div>
    </div>
  </div>
</div>
