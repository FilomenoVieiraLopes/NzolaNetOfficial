<!-- Modal Backdrop -->
<div routerLink="/app/home" class="fixed inset-0 z-[100] bg-on-surface/40 dark:bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 cursor-pointer">
    <!-- Create Post Modal Canvas -->
    <div (click)="$event.stopPropagation()" class="bg-surface-container-lowest dark:bg-slate-800 w-full max-w-[600px] rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.1)] flex flex-col overflow-hidden animate-in fade-in zoom-in-95 duration-200 cursor-default">
        
        <!-- Header -->
        <div class="flex items-center justify-between px-6 py-4 border-b border-outline-variant dark:border-slate-700">
            <div class="flex items-center gap-3">
                <button routerLink="/app/home" class="p-2 -ml-2 hover:bg-surface-container-high dark:hover:bg-slate-700 rounded-full transition-all text-on-surface-variant dark:text-slate-300">
                    <span class="material-symbols-outlined">close</span>
                </button>
                <h2 class="font-h2 text-h2 text-on-surface dark:text-white font-bold">Create Post</h2>
            </div>
            
            <div class="flex items-center gap-2">
                <!-- Visibility Selector -->
                <button (click)="toggleVisibility()"
                    class="flex items-center gap-2 px-3 py-1.5 bg-secondary-container dark:bg-slate-700 text-on-secondary-fixed-variant dark:text-slate-200 rounded-full font-label-md text-label-md hover:brightness-95 dark:hover:brightness-110 transition-all">
                    <span class="material-symbols-outlined text-[18px]">{{ isPublic ? 'public' : 'lock' }}</span>
                    <span>{{ isPublic ? 'Public' : 'Private' }}</span>
                    <span class="material-symbols-outlined text-[18px]">expand_more</span>
                </button>
            </div>
        </div>

        <!-- Content Area -->
        <div class="px-6 py-6 overflow-y-auto max-h-[614px]">
            <!-- User Identity -->
            <div class="flex items-center gap-4 mb-stack-md">
                <img alt="User" class="w-12 h-12 rounded-full object-cover"
                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuCdzPi0vCSni9Es6YD6Y_Z0oUy59_QqDDDTuBKl0NImYvsxiJ1NIFKjnsOyQY8VpqzTVLPBNE8xtzlZOUJ79lPvHaEubQR-xKIzIDtkyNUnqcZlBm10U2DaRLZALKwDuaVCkBu8NJTzj6zbiA9yGidzCkv-wGPZLX5BXiLlotnyrj5XhRq-co9vDzWpnzNVIsG2wVMtZfn7lv95eSMmWjac7UQx2wqEfNS2i7gViPTm60h7ORwkgd4p2FiK2bmlCGfrwALv0_j0coU" />
                <div>
                    <p class="font-label-md text-label-md text-on-surface dark:text-white font-bold flex items-center flex-wrap">
                        Marcus Oliveira
                        <span *ngIf="selectedLocation" class="text-primary text-sm font-normal ml-2 flex items-center bg-primary/10 px-2 py-0.5 rounded-full">
                            <span class="material-symbols-outlined text-[14px] mr-1">location_on</span>
                            {{ selectedLocation }}
                            <button (click)="removeLocation()" class="ml-1 hover:text-red-500 rounded-full flex items-center justify-center transition-all"><span class="material-symbols-outlined text-[14px]">close</span></button>
                        </span>
                    </p>
                    <p class="font-label-sm text-label-sm text-on-surface-variant dark:text-slate-400">&#64;marcus_nzola</p>
                </div>
            </div>

            <!-- Text Input Area -->
            <div class="mb-stack-md relative">
                <textarea
                    [(ngModel)]="postText"
                    class="w-full bg-transparent border-none focus:ring-0 text-body-lg font-body-lg text-on-surface dark:text-white placeholder:text-on-surface-variant/50 dark:placeholder:text-slate-500 resize-none p-0 outline-none"
                    placeholder="O que estás a pensar?" rows="4"></textarea>
                
                <!-- Emoji Picker Popup -->
                <div *ngIf="showEmojiPicker" class="absolute z-10 bottom-full left-0 mb-2 bg-surface-container-highest dark:bg-slate-700 rounded-xl shadow-lg border border-outline-variant dark:border-slate-600 p-2 w-[240px]">
                    <div class="grid grid-cols-6 gap-2">
                        <button *ngFor="let emoji of emojis" (click)="addEmoji(emoji)" class="text-xl hover:bg-surface-container-high dark:hover:bg-slate-600 p-1 rounded transition-all">
                            {{ emoji }}
                        </button>
                    </div>
                </div>
            </div>

            <input type="file" #imageInput (change)="onFileSelected($event)" accept="image/*" class="hidden" />
            <input type="file" #videoInput (change)="onFileSelected($event)" accept="video/*" class="hidden" />

            <!-- Media Preview Zone -->
            <div class="relative group cursor-pointer" (click)="!selectedImage && triggerFileInput(videoInput)">
                <!-- Empty State Dropzone -->
                <div *ngIf="!selectedImage"
                    class="w-full aspect-[16/9] rounded-xl border-2 border-dashed border-outline-variant dark:border-slate-700 bg-surface-container-low dark:bg-slate-900/50 flex flex-col items-center justify-center gap-3 hover:bg-surface-container-high dark:hover:bg-slate-700 hover:border-primary dark:hover:border-primary transition-all group-active:scale-[0.99]">
                    <div
                        class="w-12 h-12 rounded-full bg-surface-container-highest dark:bg-slate-800 flex items-center justify-center">
                        <span class="material-symbols-outlined text-primary"
                            style="font-variation-settings: 'FILL' 0;">video_call</span>
                    </div>
                    <p class="font-label-md text-label-md text-on-surface-variant dark:text-slate-400">Add video</p>
                </div>
                
                <!-- Image/Video Preview -->
                <div *ngIf="selectedImage" class="relative w-full rounded-xl overflow-hidden shadow-sm group bg-black flex justify-center items-center max-h-[400px]">
                    <img *ngIf="selectedMediaType === 'image'" [src]="selectedImage" alt="Preview" class="w-full h-auto max-h-[400px] object-contain" />
                    <video *ngIf="selectedMediaType === 'video'" [src]="selectedImage" autoplay loop muted playsinline class="w-full h-auto max-h-[400px] object-contain"></video>

                    <button (click)="removeImage(); $event.stopPropagation()" class="absolute top-2 right-2 bg-black/60 hover:bg-black/80 text-white rounded-full p-2 backdrop-blur-md transition-all opacity-0 group-hover:opacity-100 flex items-center justify-center z-10">
                        <span class="material-symbols-outlined text-[20px]">close</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Toolbar & Action Footer -->
        <div class="px-6 py-4 bg-surface-container-low/50 dark:bg-slate-900/50 mt-auto border-t border-outline-variant dark:border-slate-700">
            <div class="flex flex-wrap items-center justify-between gap-4">
                <!-- Tool Icons -->
                <div class="flex items-center gap-1 relative">
                    <button (click)="triggerFileInput(imageInput)" class="p-2.5 rounded-full text-primary hover:bg-primary-fixed dark:hover:bg-primary/20 transition-all active:scale-90" title="Add Image">
                        <span class="material-symbols-outlined" data-icon="image">image</span>
                    </button>
                    <button (click)="toggleGifPicker()" class="p-2.5 rounded-full text-primary hover:bg-primary-fixed dark:hover:bg-primary/20 transition-all active:scale-90" title="GIF">
                        <span class="material-symbols-outlined" data-icon="gif_box">gif_box</span>
                    </button>
                    <button (click)="toggleEmojiPicker()" class="p-2.5 rounded-full text-primary hover:bg-primary-fixed dark:hover:bg-primary/20 transition-all active:scale-90" title="Emoji">
                        <span class="material-symbols-outlined" data-icon="mood">mood</span>
                    </button>
                    <button class="p-2.5 rounded-full text-primary hover:bg-primary-fixed dark:hover:bg-primary/20 transition-all active:scale-90" title="Poll">
                        <span class="material-symbols-outlined" data-icon="ballot">ballot</span>
                    </button>
                    <div class="h-6 w-px bg-outline-variant dark:bg-slate-700 mx-2"></div>
                    <button (click)="toggleLocationPicker()" class="p-2.5 rounded-full text-on-surface-variant dark:text-slate-400 hover:bg-surface-container-high dark:hover:bg-slate-700 transition-all active:scale-90" title="Location">
                        <span class="material-symbols-outlined" data-icon="location_on">location_on</span>
                    </button>

                    <!-- Location Picker Popup -->
                    <div *ngIf="showLocationPicker" class="absolute z-10 bottom-full left-0 ml-32 mb-2 bg-surface-container-highest dark:bg-slate-700 rounded-xl shadow-lg border border-outline-variant dark:border-slate-600 p-2 w-[200px] flex flex-col gap-1">
                        <button *ngFor="let loc of locations" (click)="selectLocation(loc)" class="text-sm text-left text-on-surface dark:text-white hover:bg-surface-container-high dark:hover:bg-slate-600 px-3 py-2 rounded-lg transition-all flex items-center gap-2">
                            <span class="material-symbols-outlined text-[16px] text-on-surface-variant dark:text-slate-400">location_on</span>
                            {{ loc }}
                        </button>
                    </div>

                    <!-- GIF Picker Popup -->
                    <div *ngIf="showGifPicker" class="absolute z-10 bottom-full left-0 ml-8 mb-2 bg-surface-container-highest dark:bg-slate-700 rounded-xl shadow-lg border border-outline-variant dark:border-slate-600 p-2 w-[300px] h-[250px] overflow-y-auto">
                        <div class="grid grid-cols-2 gap-2">
                            <button *ngFor="let gifUrl of gifs" (click)="selectGif(gifUrl)" class="w-full h-[100px] rounded-lg overflow-hidden border-2 border-transparent hover:border-primary transition-all">
                                <img [src]="gifUrl" alt="GIF" class="w-full h-full object-cover pointer-events-none" />
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Post Button -->
                <button (click)="publishPost()" [disabled]="isPublishing || (!postText.trim() && !selectedImage)"
                    class="bg-primary text-on-primary px-8 py-2.5 rounded-full font-label-md text-label-md font-bold shadow-md hover:shadow-lg hover:bg-blue-700 active:scale-95 transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center min-w-[100px]">
                    <span *ngIf="!isPublishing">Publicar</span>
                    <span *ngIf="isPublishing" class="material-symbols-outlined animate-spin text-[20px]">progress_activity</span>
                </button>
            </div>
        </div>
    </div>
</div>
