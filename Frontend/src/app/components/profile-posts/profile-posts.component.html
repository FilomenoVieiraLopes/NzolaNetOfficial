<div *ngIf="posts.length === 0" class="bg-white dark:bg-slate-800 rounded-2xl p-8 text-sm text-gray-500">
  Ainda nao existem publicacoes neste perfil.
</div>

<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
  <article *ngFor="let post of posts" (click)="open.emit(post)" class="bg-white dark:bg-slate-800 rounded-2xl p-5 shadow-sm cursor-pointer transition hover:-translate-y-0.5 hover:shadow-md">
    <div class="mb-3 flex items-start justify-between gap-3">
      <span class="text-xs font-semibold text-gray-500">{{ post.created_at | date:'short' }}</span>

      <div *ngIf="canEditPost(post) || canDeletePost(post)" class="flex items-center gap-1">
        <button *ngIf="canEditPost(post) && editingPostId !== post.id" (click)="startEdit(post, $event)" class="w-8 h-8 rounded-full hover:bg-gray-100 dark:hover:bg-slate-700 text-gray-500 hover:text-primary flex items-center justify-center" title="Editar publicacao">
          <span class="material-symbols-outlined text-[18px]">edit</span>
        </button>
        <button *ngIf="canDeletePost(post)" (click)="requestDelete(post, $event)" class="w-8 h-8 rounded-full hover:bg-red-50 text-gray-500 hover:text-red-600 flex items-center justify-center" title="Eliminar publicacao">
          <span class="material-symbols-outlined text-[18px]">delete</span>
        </button>
      </div>
    </div>

    <ng-container *ngIf="editingPostId === post.id; else profilePostContent">
      <textarea [(ngModel)]="editPostContent" (click)="$event.stopPropagation()" class="w-full bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-xl px-4 py-3 text-sm text-gray-900 dark:text-white focus:ring-2 focus:ring-primary/20 resize-none" rows="3"></textarea>
      <div class="mt-3 flex justify-end gap-2">
        <button (click)="cancelEdit($event)" class="px-4 py-2 rounded-full text-xs font-bold text-gray-600 hover:bg-gray-100">Cancelar</button>
        <button (click)="saveEdit(post, $event)" [disabled]="!editPostContent.trim()" class="px-4 py-2 rounded-full text-xs font-bold bg-primary text-white disabled:opacity-50">Guardar</button>
      </div>
    </ng-container>

    <ng-template #profilePostContent>
      <p class="text-sm text-gray-900 dark:text-white whitespace-pre-wrap line-clamp-4">{{ post.content }}</p>
    </ng-template>

    <img *ngIf="post.image_url" [src]="post.image_url" class="mt-4 w-full aspect-video object-cover rounded-xl" alt="Imagem da publicacao">
    <video *ngIf="post.video_url" [src]="post.video_url" class="mt-4 w-full aspect-video object-cover rounded-xl" controls></video>

    <div class="mt-4 flex gap-4 text-xs text-gray-500">
      <span>{{ post.bazes_count }} bazes</span>
      <span>{{ post.comments_count }} comentarios</span>
    </div>
  </article>
</div>

<div *ngIf="isLoadingMore" class="py-5 text-center text-sm text-gray-500 dark:text-slate-300">
  A carregar mais publicacoes...
</div>
