<main class="min-h-screen bg-slate-50 dark:bg-slate-900 flex items-center justify-center px-6 py-12">
  <section class="w-full max-w-md rounded-3xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 p-8 shadow-xl">
    <a routerLink="/login" class="text-sm font-semibold text-blue-600 hover:underline">Voltar ao login</a>
    <h1 class="mt-6 text-3xl font-bold text-slate-950 dark:text-white">Redefinir senha</h1>
    <p class="mt-3 text-sm leading-6 text-slate-600 dark:text-slate-300">Use o token recebido no email para criar uma nova senha.</p>

    <form (ngSubmit)="submit()" class="mt-8 space-y-5">
      <input name="token" [(ngModel)]="token" class="w-full rounded-2xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 px-5 py-4 text-sm outline-none focus:border-blue-600" placeholder="Token" required />
      <input name="email" [(ngModel)]="email" type="email" class="w-full rounded-2xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 px-5 py-4 text-sm outline-none focus:border-blue-600" placeholder="Email" required />
      <input name="password" [(ngModel)]="password" type="password" class="w-full rounded-2xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 px-5 py-4 text-sm outline-none focus:border-blue-600" placeholder="Nova senha" required />
      <input name="passwordConfirmation" [(ngModel)]="passwordConfirmation" type="password" class="w-full rounded-2xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 px-5 py-4 text-sm outline-none focus:border-blue-600" placeholder="Confirmar senha" required />

      <p *ngIf="message" class="rounded-2xl bg-emerald-50 px-4 py-3 text-sm text-emerald-700">{{ message }}</p>
      <p *ngIf="error" class="rounded-2xl bg-red-50 px-4 py-3 text-sm text-red-700">{{ error }}</p>

      <button type="submit" [disabled]="isLoading" class="w-full rounded-full bg-blue-600 px-6 py-4 text-base font-semibold text-white transition hover:bg-blue-700 disabled:opacity-50">
        {{ isLoading ? 'A guardar...' : 'Redefinir senha' }}
      </button>
    </form>
  </section>
</main>
