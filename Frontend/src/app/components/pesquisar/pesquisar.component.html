<div class="space-y-8">

  <!-- Search Input -->
  <div>
    <div class="relative">
      <svg class="absolute left-5 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
      </svg>
      <input
        placeholder="Search members, communities, or topics..."
        class="w-full border border-gray-200 dark:border-slate-700 rounded-full py-4 pl-14 pr-6 outline-none focus:border-primary text-gray-700 dark:text-slate-300 bg-white dark:bg-slate-800"
      >
    </div>

    <!-- Filters -->
    <div class="flex gap-2 mt-5">
      <button class="bg-primary text-white px-5 py-2 rounded-full text-sm font-semibold">All Users</button>
      <button class="bg-gray-200/80 dark:bg-slate-700/50 text-gray-700 dark:text-slate-300 px-5 py-2 rounded-full text-sm font-semibold hover:bg-gray-300 dark:hover:bg-slate-600">Premium</button>
      <button class="bg-gray-200/80 dark:bg-slate-700/50 text-gray-700 dark:text-slate-300 px-5 py-2 rounded-full text-sm font-semibold hover:bg-gray-300 dark:hover:bg-slate-600">Following</button>
      <button class="bg-gray-200/80 dark:bg-slate-700/50 text-gray-700 dark:text-slate-300 px-5 py-2 rounded-full text-sm font-semibold hover:bg-gray-300 dark:hover:bg-slate-600">Experts</button>
    </div>
  </div>

  <!-- Users List -->
  <div class="space-y-4">
    @for(user of users; track user.name){
      <div class="bg-white dark:bg-slate-800 rounded-2xl p-6 flex items-center justify-between shadow-[0_2px_10px_-4px_rgba(0,0,0,0.1)]">
        <div class="flex items-center gap-5">
          <img 
            [src]="user.img" 
            class="w-16 h-16 rounded-full object-cover"
          >
          <div>
            <div class="flex items-center gap-2">
              <h3 class="font-bold text-xl text-gray-900 dark:text-white">{{user.name}}</h3>
              @if(user.isVerified) {
                <svg class="w-5 h-5 text-primary" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                  <path fill-rule="evenodd" d="M8.603 3.799A4.49 4.49 0 0 1 12 2.25c1.357 0 2.573.6 3.397 1.549a4.49 4.49 0 0 1 3.498 1.307 4.491 4.491 0 0 1 1.307 3.497A4.49 4.49 0 0 1 21.75 12a4.49 4.49 0 0 1-1.549 3.397 4.491 4.491 0 0 1-1.307 3.497 4.491 4.491 0 0 1-3.497 1.307A4.49 4.49 0 0 1 12 21.75a4.49 4.49 0 0 1-3.397-1.549 4.49 4.49 0 0 1-3.498-1.306 4.491 4.491 0 0 1-1.307-3.498A4.49 4.49 0 0 1 2.25 12c0-1.357.6-2.573 1.549-3.397a4.49 4.49 0 0 1 1.307-3.497 4.49 4.49 0 0 1 3.497-1.307Zm7.007 6.387a.75.75 0 1 0-1.22-.872l-3.236 4.53L9.53 12.22a.75.75 0 0 0-1.06 1.06l2.25 2.25a.75.75 0 0 0 1.14-.094l3.75-5.25Z" clip-rule="evenodd" />
                </svg>
              }
            </div>
            <p class="text-gray-600 dark:text-slate-400 dark:text-slate-500 text-sm mt-0.5 font-medium">{{user.role}}</p>
          </div>
        </div>

        @if(user.isFollowing) {
          <button class="bg-white dark:bg-slate-800 border-2 border-gray-200 dark:border-slate-700 text-primary font-bold px-8 py-2.5 rounded-full hover:bg-gray-50 dark:hover:bg-slate-700 transition-colors">
            Profile
          </button>
        } @else {
          <button class="bg-primary text-white font-bold px-8 py-2.5 rounded-full hover:bg-blue-700 transition-colors">
            Follow
          </button>
        }
      </div>
    }
  </div>

</div>
