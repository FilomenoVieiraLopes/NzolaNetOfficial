<div class="fixed right-4 top-4 z-[1000] w-[min(380px,calc(100vw-2rem))] space-y-3 pointer-events-none">
  <div
    *ngFor="let toast of toastService.toasts$ | async"
    class="pointer-events-auto flex items-start gap-3 rounded-2xl border px-4 py-3 shadow-lg backdrop-blur transition-all"
    [ngClass]="classFor(toast)">
    <span class="material-symbols-outlined text-[22px] mt-0.5">{{ iconFor(toast) }}</span>
    <p class="min-w-0 flex-1 text-sm font-semibold leading-snug">{{ toast.message }}</p>
    <button type="button" (click)="toastService.dismiss(toast.id)" class="w-7 h-7 rounded-full hover:bg-black/5 flex items-center justify-center" title="Fechar">
      <span class="material-symbols-outlined text-[18px]">close</span>
    </button>
  </div>
</div>

<section *ngIf="toastService.confirm$ | async as confirm" class="fixed inset-0 z-[1001] bg-black/40 backdrop-blur-[2px] flex items-center justify-center px-4">
  <div class="w-full max-w-md rounded-3xl bg-white dark:bg-slate-800 shadow-2xl border border-slate-200 dark:border-slate-700 p-6">
    <h2 class="text-xl font-black text-slate-950 dark:text-white">{{ confirm.title }}</h2>
    <p class="mt-3 text-sm text-slate-600 dark:text-slate-300 leading-relaxed">{{ confirm.message }}</p>

    <div class="mt-6 flex flex-col-reverse sm:flex-row sm:justify-end gap-3">
      <button type="button" (click)="toastService.resolveConfirm(false)" class="px-5 py-2.5 rounded-full text-sm font-bold bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 hover:bg-slate-200 dark:hover:bg-slate-600">
        {{ confirm.cancelText }}
      </button>
      <button type="button" (click)="toastService.resolveConfirm(true)" class="px-5 py-2.5 rounded-full text-sm font-bold text-white" [ngClass]="confirm.tone === 'danger' ? 'bg-red-600 hover:bg-red-700' : 'bg-primary hover:bg-primary/90'">
        {{ confirm.confirmText }}
      </button>
    </div>
  </div>
</section>
