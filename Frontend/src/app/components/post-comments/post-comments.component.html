<section class="mt-4 pt-4 border-t border-outline-variant/10">
  <div *ngIf="loading" class="py-3 text-sm text-on-surface-variant">A carregar comentarios...</div>

  <div *ngIf="!loading && post.comments?.length" class="space-y-3 mb-4">
    <article *ngFor="let comment of topLevelComments()" class="flex gap-3" (click)="closeCommentMenu()">
      <ng-container *ngIf="comment.author_avatar; else inlineCommentAvatarFallback">
        <img [src]="comment.author_avatar" [alt]="comment.author_name" class="w-9 h-9 rounded-full object-cover">
      </ng-container>
      <ng-template #inlineCommentAvatarFallback>
        <div class="w-9 h-9 rounded-full bg-primary/10 text-primary flex items-center justify-center flex-shrink-0">
          <span class="material-symbols-outlined text-[20px]">person</span>
        </div>
      </ng-template>

      <div class="min-w-0 flex-1">
        <div class="rounded-2xl bg-surface-container-low dark:bg-slate-900 px-4 py-3">
          <div class="flex items-start justify-between gap-3">
            <div class="min-w-0">
              <p class="font-bold text-sm text-on-surface dark:text-white truncate">{{ comment.author_name }}</p>
              <p class="text-[11px] text-on-surface-variant">{{ comment.created_at | date:'shortTime' }}</p>
            </div>

            <div class="flex items-center gap-2 flex-shrink-0">
              <button (click)="giveCommentBaze(comment)" class="inline-flex items-center gap-1 transition-colors" [class.text-red-600]="comment.has_bazed" [class.hover:text-red-600]="!comment.has_bazed" [class.text-on-surface-variant]="!comment.has_bazed" title="Baze">
                <span class="material-symbols-outlined text-[16px]" [style.font-variation-settings]="comment.has_bazed ? '\'FILL\' 1' : '\'FILL\' 0'">favorite</span>
                <span class="text-[11px] font-semibold">{{ comment.bazes_count || 0 }}</span>
              </button>

              <div *ngIf="canEditComment(comment) || canDeleteComment(comment)" class="relative">
                <button (click)="toggleCommentMenu(comment.id); $event.stopPropagation()" class="w-6 h-6 text-on-surface-variant hover:text-primary flex items-center justify-center" title="Opcoes">
                  <span class="material-symbols-outlined text-[16px]">more_vert</span>
                </button>
                <div *ngIf="openCommentMenuId === comment.id" class="absolute right-0 mt-2 w-40 bg-white dark:bg-slate-700 rounded-xl shadow-lg border border-outline-variant/20 dark:border-slate-600 z-20" (click)="$event.stopPropagation()">
                  <button *ngIf="canEditComment(comment) && editingCommentId !== comment.id" (click)="startEditComment(comment)" class="w-full text-left px-3 py-2 text-xs text-on-surface dark:text-slate-100 hover:bg-surface-container dark:hover:bg-slate-600 flex items-center gap-2 border-b border-outline-variant/10 dark:border-slate-600">
                    <span class="material-symbols-outlined text-[14px]">edit</span>
                    Editar
                  </button>
                  <button *ngIf="canDeleteComment(comment)" (click)="deleteComment(comment)" class="w-full text-left px-3 py-2 text-xs text-red-600 hover:bg-red-50 dark:hover:bg-slate-600 flex items-center gap-2">
                    <span class="material-symbols-outlined text-[14px]">delete</span>
                    Eliminar
                  </button>
                </div>
              </div>
            </div>
          </div>

          <ng-container *ngIf="editingCommentId === comment.id; else inlineCommentText">
            <textarea [(ngModel)]="editCommentText" class="mt-2 w-full bg-white dark:bg-slate-800 border border-outline-variant/30 rounded-xl px-3 py-2 text-sm text-on-surface dark:text-white focus:ring-2 focus:ring-primary/20 resize-none" rows="2"></textarea>
            <div class="mt-2 flex justify-end gap-2">
              <button (click)="cancelEditComment()" class="px-3 py-1.5 rounded-full text-xs font-bold text-on-surface-variant hover:bg-surface-container">Cancelar</button>
              <button (click)="saveComment(comment)" [disabled]="!editCommentText.trim()" class="px-3 py-1.5 rounded-full text-xs font-bold bg-primary text-on-primary disabled:opacity-50">Guardar</button>
            </div>
          </ng-container>
          <ng-template #inlineCommentText>
            <p class="mt-2 text-sm text-on-surface dark:text-slate-100 whitespace-pre-wrap">{{ comment.body }}</p>
          </ng-template>
        </div>

        <div class="mt-1 ml-3 flex items-center gap-3 text-xs">
          <button type="button" (click)="startReply(comment); $event.stopPropagation()" class="font-semibold text-on-surface-variant hover:text-primary">
            Responder
          </button>
        </div>

        <div *ngIf="commentReplies(comment).length > 0" class="mt-3 ml-5 space-y-3 border-l border-outline-variant/20 pl-4">
          <article *ngFor="let reply of commentReplies(comment)" class="flex gap-3">
            <ng-container *ngIf="reply.author_avatar; else replyAvatarFallback">
              <img [src]="reply.author_avatar" [alt]="reply.author_name" class="w-8 h-8 rounded-full object-cover">
            </ng-container>
            <ng-template #replyAvatarFallback>
              <div class="w-8 h-8 rounded-full bg-primary/10 text-primary flex items-center justify-center flex-shrink-0">
                <span class="material-symbols-outlined text-[18px]">person</span>
              </div>
            </ng-template>

            <div class="min-w-0 flex-1">
              <div class="rounded-2xl bg-surface-container-low dark:bg-slate-900 px-4 py-3">
                <div class="flex items-start justify-between gap-3">
                  <div class="min-w-0">
                    <p class="font-bold text-sm text-on-surface dark:text-white truncate">{{ reply.author_name }}</p>
                    <p class="text-[11px] text-on-surface-variant">{{ reply.created_at | date:'shortTime' }}</p>
                  </div>
                  <div class="flex items-center gap-2 flex-shrink-0">
                    <button (click)="giveCommentBaze(reply)" class="inline-flex items-center gap-1 transition-colors" [class.text-red-600]="reply.has_bazed" [class.hover:text-red-600]="!reply.has_bazed" [class.text-on-surface-variant]="!reply.has_bazed" title="Baze">
                      <span class="material-symbols-outlined text-[16px]" [style.font-variation-settings]="reply.has_bazed ? '\'FILL\' 1' : '\'FILL\' 0'">favorite</span>
                      <span class="text-[11px] font-semibold">{{ reply.bazes_count || 0 }}</span>
                    </button>
                    <div *ngIf="canEditComment(reply) || canDeleteComment(reply)" class="relative">
                      <button (click)="toggleCommentMenu(reply.id); $event.stopPropagation()" class="w-6 h-6 text-on-surface-variant hover:text-primary flex items-center justify-center" title="Opcoes">
                        <span class="material-symbols-outlined text-[16px]">more_vert</span>
                      </button>
                      <div *ngIf="openCommentMenuId === reply.id" class="absolute right-0 mt-2 w-40 bg-white dark:bg-slate-700 rounded-xl shadow-lg border border-outline-variant/20 dark:border-slate-600 z-20" (click)="$event.stopPropagation()">
                        <button *ngIf="canEditComment(reply) && editingCommentId !== reply.id" (click)="startEditComment(reply)" class="w-full text-left px-3 py-2 text-xs text-on-surface dark:text-slate-100 hover:bg-surface-container dark:hover:bg-slate-600 flex items-center gap-2 border-b border-outline-variant/10 dark:border-slate-600">
                          <span class="material-symbols-outlined text-[14px]">edit</span>
                          Editar
                        </button>
                        <button *ngIf="canDeleteComment(reply)" (click)="deleteComment(reply)" class="w-full text-left px-3 py-2 text-xs text-red-600 hover:bg-red-50 dark:hover:bg-slate-600 flex items-center gap-2">
                          <span class="material-symbols-outlined text-[14px]">delete</span>
                          Eliminar
                        </button>
                      </div>
                    </div>
                  </div>
                </div>

                <ng-container *ngIf="editingCommentId === reply.id; else inlineReplyText">
                  <textarea [(ngModel)]="editCommentText" class="mt-2 w-full bg-white dark:bg-slate-800 border border-outline-variant/30 rounded-xl px-3 py-2 text-sm text-on-surface dark:text-white focus:ring-2 focus:ring-primary/20 resize-none" rows="2"></textarea>
                  <div class="mt-2 flex justify-end gap-2">
                    <button (click)="cancelEditComment()" class="px-3 py-1.5 rounded-full text-xs font-bold text-on-surface-variant hover:bg-surface-container">Cancelar</button>
                    <button (click)="saveComment(reply)" [disabled]="!editCommentText.trim()" class="px-3 py-1.5 rounded-full text-xs font-bold bg-primary text-on-primary disabled:opacity-50">Guardar</button>
                  </div>
                </ng-container>
                <ng-template #inlineReplyText>
                  <p class="mt-2 text-sm text-on-surface dark:text-slate-100 whitespace-pre-wrap">{{ reply.body }}</p>
                </ng-template>
              </div>
            </div>
          </article>
        </div>

        <div *ngIf="replyingToCommentId === comment.id" class="mt-3 ml-5 flex items-center gap-2">
          <ng-container *ngIf="currentUser?.avatar_url; else replyCurrentAvatarFallback">
            <img [src]="currentUser?.avatar_url" [alt]="currentUser?.name || 'Utilizador'" class="w-8 h-8 rounded-full object-cover">
          </ng-container>
          <ng-template #replyCurrentAvatarFallback>
            <div class="w-8 h-8 rounded-full bg-primary/10 text-primary flex items-center justify-center flex-shrink-0">
              <span class="material-symbols-outlined text-[18px]">person</span>
            </div>
          </ng-template>
          <div class="flex-1 flex items-center gap-2 rounded-full bg-surface-container-low dark:bg-slate-900 px-4 py-2">
            <input [(ngModel)]="replyDrafts[comment.id]" (keyup.enter)="submitReply(comment)" class="min-w-0 flex-1 bg-transparent border-none outline-none text-sm text-on-surface dark:text-white placeholder:text-on-surface-variant focus:ring-0" [placeholder]="'Responder a ' + comment.author_name + '...'" type="text">
            <button (click)="submitReply(comment)" [disabled]="!replyDrafts[comment.id] || !replyDrafts[comment.id].trim()" class="w-8 h-8 rounded-full text-primary disabled:text-on-surface-variant/40 flex items-center justify-center" title="Enviar resposta">
              <span class="material-symbols-outlined text-[20px]">send</span>
            </button>
          </div>
          <button type="button" (click)="cancelReply()" class="w-8 h-8 rounded-full text-on-surface-variant hover:text-red-600 flex items-center justify-center" title="Cancelar">
            <span class="material-symbols-outlined text-[18px]">close</span>
          </button>
        </div>
      </div>
    </article>
  </div>

  <p *ngIf="!loading && !post.comments?.length" class="mb-4 text-sm text-on-surface-variant">Ainda nao existem comentarios.</p>

  <div class="flex items-center gap-3">
    <ng-container *ngIf="currentUser?.avatar_url; else currentUserCommentAvatarFallback">
      <img [src]="currentUser?.avatar_url" [alt]="currentUser?.name || 'Utilizador'" class="w-9 h-9 rounded-full object-cover">
    </ng-container>
    <ng-template #currentUserCommentAvatarFallback>
      <div class="w-9 h-9 rounded-full bg-primary/10 text-primary flex items-center justify-center flex-shrink-0">
        <span class="material-symbols-outlined text-[20px]">person</span>
      </div>
    </ng-template>

    <div class="flex-1 flex items-center gap-2 rounded-full bg-surface-container-low dark:bg-slate-900 px-4 py-2">
      <input [(ngModel)]="commentDraft" (keyup.enter)="submitComment()" class="min-w-0 flex-1 bg-transparent border-none outline-none text-sm text-on-surface dark:text-white placeholder:text-on-surface-variant focus:ring-0" placeholder="Escreva um comentario..." type="text">
      <button (click)="submitComment()" [disabled]="!commentDraft.trim()" class="w-8 h-8 rounded-full text-primary disabled:text-on-surface-variant/40 flex items-center justify-center" title="Enviar comentario">
        <span class="material-symbols-outlined text-[22px]">send</span>
      </button>
    </div>
  </div>
</section>
