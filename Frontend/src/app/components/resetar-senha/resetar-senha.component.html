<main class="min-h-screen bg-slate-50 dark:bg-slate-900 flex items-center justify-center px-6 py-12">
  <section class="w-full max-w-lg rounded-3xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 p-8 shadow-[0_24px_70px_rgba(15,23,42,0.12)]">
    <a routerLink="/login" class="inline-flex items-center gap-2 text-sm font-semibold text-blue-600 hover:underline">
      <span class="material-symbols-outlined text-[18px]">arrow_back</span>
      Voltar ao login
    </a>

    <div class="mt-8">
      <h1 class="text-3xl font-black text-slate-950 dark:text-white">Definir nova senha</h1>
      <p class="mt-3 text-sm leading-6 text-slate-600 dark:text-slate-300">
        Escolha uma nova palavra-passe para voltar a acessar a NzolaNet.
      </p>
    </div>

    <form (ngSubmit)="submit()" class="mt-8 space-y-5">
      <div>
        <label for="email" class="block text-sm font-medium text-slate-700 dark:text-slate-300">Email</label>
        <input id="email" name="email" [(ngModel)]="email" type="email" class="mt-2 w-full rounded-2xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 px-5 py-4 text-sm text-slate-900 dark:text-white outline-none transition focus:border-blue-600 focus:ring-2 focus:ring-blue-100" required />
      </div>

      <div>
        <label for="token" class="block text-sm font-medium text-slate-700 dark:text-slate-300">Token</label>
        <input id="token" name="token" [(ngModel)]="token" type="text" class="mt-2 w-full rounded-2xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 px-5 py-4 text-sm text-slate-900 dark:text-white outline-none transition focus:border-blue-600 focus:ring-2 focus:ring-blue-100" required />
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-slate-700 dark:text-slate-300">Nova palavra-passe</label>
        <input id="password" name="password" [(ngModel)]="password" type="password" class="mt-2 w-full rounded-2xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 px-5 py-4 text-sm text-slate-900 dark:text-white outline-none transition focus:border-blue-600 focus:ring-2 focus:ring-blue-100" required />
      </div>

      <div>
        <label for="passwordConfirmation" class="block text-sm font-medium text-slate-700 dark:text-slate-300">Confirmar palavra-passe</label>
        <input id="passwordConfirmation" name="passwordConfirmation" [(ngModel)]="passwordConfirmation" type="password" class="mt-2 w-full rounded-2xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 px-5 py-4 text-sm text-slate-900 dark:text-white outline-none transition focus:border-blue-600 focus:ring-2 focus:ring-blue-100" required />
      </div>

      <p *ngIf="message" class="rounded-2xl bg-green-50 px-4 py-3 text-sm font-medium text-green-700">{{ message }}</p>
      <p *ngIf="error" class="rounded-2xl bg-red-50 px-4 py-3 text-sm font-medium text-red-700">{{ error }}</p>

      <button type="submit" [disabled]="isLoading" class="flex w-full items-center justify-center rounded-full bg-blue-600 px-6 py-4 text-base font-semibold text-white transition hover:bg-blue-700 disabled:opacity-60">
        <span *ngIf="isLoading" class="mr-2 border-2 border-white border-t-transparent w-5 h-5 rounded-full animate-spin"></span>
        Guardar nova senha
      </button>
    </form>
  </section>
</main>
