<div class="flex w-full min-h-screen">
  <main class="flex-1 min-w-0 bg-background dark:bg-slate-900">
    <div class="max-w-[640px] mx-auto px-4 py-stack-md lg:py-stack-lg space-y-stack-md">
      <div class="relative flex items-center justify-between">
        <div>
          <h1 class="font-display font-black text-3xl text-on-surface dark:text-white">Feed</h1>
          <p class="text-sm text-on-surface-variant dark:text-slate-300">Publicacoes recentes da NzolaNet.</p>
        </div>

        <app-home-notifications
          [notifications]="notifications"
          [unreadNotifications]="unreadNotifications"
          [showNotifications]="showNotifications"
          (toggle)="toggleNotifications()"
          (markAllRead)="markAllNotificationsAsRead()"
          (open)="openNotification($event)"
          (delete)="deleteNotification($event.notification, $event.event)"
          (acceptFollow)="acceptFollowRequestFromNotification($event.notification, $event.event)"
          (rejectFollow)="rejectFollowRequestFromNotification($event.notification, $event.event)"
          (closePanel)="showNotifications = false" />
      </div>

      <div class="flex gap-2">
        <button (click)="loadFeed('general')" class="px-4 py-2 rounded-full text-sm font-semibold" [class.bg-primary]="feedMode === 'general'" [class.text-white]="feedMode === 'general'" [class.bg-surface-container]="feedMode !== 'general'">Geral</button>
        <button (click)="loadFeed('following')" class="px-4 py-2 rounded-full text-sm font-semibold" [class.bg-primary]="feedMode === 'following'" [class.text-white]="feedMode === 'following'" [class.bg-surface-container]="feedMode !== 'following'">Seguindo</button>
      </div>

      <div *ngIf="isLoading" class="bg-surface-container-lowest dark:bg-slate-800 rounded-xl p-stack-md text-sm">A carregar publicacoes...</div>
      <div *ngIf="!isLoading && posts.length === 0" class="bg-surface-container-lowest dark:bg-slate-800 rounded-xl p-stack-md text-sm text-on-surface-variant">Nenhuma publicacao encontrada.</div>

      <article *ngFor="let post of posts" [id]="'post-' + post.id" class="bg-surface-container-lowest dark:bg-slate-800 rounded-xl shadow-[0_4px_20px_rgba(15,23,42,0.05)] p-stack-md transition-shadow" [class.ring-2]="targetPostId === post.id" [class.ring-primary]="targetPostId === post.id" (click)="closeMenu()">
        <div class="flex gap-3 mb-3">
          <ng-container *ngIf="post.author_avatar; else postAvatarFallback">
            <img [routerLink]="['/app/perfil', post.user_id]" class="w-11 h-11 rounded-full object-cover cursor-pointer hover:opacity-80 transition-opacity" [src]="post.author_avatar" [alt]="post.author_name">
          </ng-container>
          <ng-template #postAvatarFallback>
            <div [routerLink]="['/app/perfil', post.user_id]" class="w-11 h-11 rounded-full bg-primary/10 text-primary flex items-center justify-center flex-shrink-0 cursor-pointer hover:bg-primary/20 transition-colors">
              <span class="material-symbols-outlined text-[24px]">person</span>
            </div>
          </ng-template>
          <div class="flex-1">
            <div class="flex justify-between items-start gap-3">
              <h3 [routerLink]="['/app/perfil', post.user_id]" class="font-bold text-body-md">{{ post.author_name }}</h3>
              <div class="flex items-center gap-1">
                <span class="text-label-sm text-on-surface-variant">{{ post.created_at | date:'shortTime' }}</span>
                <div *ngIf="canEditPost(post) || canDeletePost(post)" class="relative">
                  <button (click)="toggleMenu(post.id); $event.stopPropagation()" class="w-8 h-8 rounded-full hover:bg-surface-container text-on-surface-variant hover:text-primary flex items-center justify-center" title="Opcoes">
                    <span class="material-symbols-outlined text-[18px]">more_vert</span>
                  </button>
                  <div *ngIf="openMenuPostId === post.id" class="absolute right-0 mt-2 w-48 bg-white dark:bg-slate-700 rounded-xl shadow-lg border border-outline-variant/20 dark:border-slate-600 z-20" (click)="$event.stopPropagation()">
                    <button *ngIf="canEditPost(post) && editingPostId !== post.id" (click)="startEditPost(post)" class="w-full text-left px-4 py-3 text-sm text-on-surface dark:text-slate-100 hover:bg-surface-container dark:hover:bg-slate-600 flex items-center gap-2 border-b border-outline-variant/10 dark:border-slate-600">
                      <span class="material-symbols-outlined text-[18px]">edit</span>
                      Editar
                    </button>
                    <button *ngIf="canDeletePost(post)" (click)="deletePost(post)" class="w-full text-left px-4 py-3 text-sm text-red-600 hover:bg-red-50 dark:hover:bg-slate-600 flex items-center gap-2">
                      <span class="material-symbols-outlined text-[18px]">delete</span>
                      Eliminar
                    </button>
                  </div>
                </div>
              </div>
            </div>
            <p class="text-label-sm text-on-secondary-container"></p>
          </div>
        </div>

        <ng-container *ngIf="editingPostId === post.id; else postContentView">
          <textarea [(ngModel)]="editPostContent" class="w-full bg-surface-container-low border-none rounded-xl px-4 py-3 text-body-md text-on-surface focus:ring-2 focus:ring-primary/20 resize-none mb-3" rows="3"></textarea>
          <div class="mb-stack-md flex justify-end gap-2">
            <button (click)="cancelEditPost()" class="px-4 py-2 rounded-full text-label-sm font-bold text-on-surface-variant hover:bg-surface-container">Cancelar</button>
            <button (click)="savePost(post)" [disabled]="!editPostContent.trim()" class="px-4 py-2 rounded-full text-label-sm font-bold bg-primary text-on-primary disabled:opacity-50">Guardar</button>
          </div>
        </ng-container>
        <ng-template #postContentView>
          <p class="text-body-md text-on-surface dark:text-white mb-stack-md leading-relaxed whitespace-pre-wrap">{{ post.content }}</p>
        </ng-template>

        <div *ngIf="post.image_url || post.video_url" class="rounded-xl overflow-hidden mb-stack-md bg-black max-h-[400px] flex justify-center">
          <img *ngIf="post.image_url" [src]="post.image_url" alt="Imagem da publicacao" class="w-full h-auto max-h-[400px] object-contain">
          <video *ngIf="post.video_url" [src]="post.video_url" controls class="w-full h-auto max-h-[400px] object-contain"></video>
        </div>

        <div class="flex items-center justify-between pt-2 border-t border-outline-variant/10">
          <div class="flex gap-6">
            <button (click)="giveBaze(post)" class="flex items-center gap-1.5 transition-colors" [class.text-red-600]="post.has_bazed" [class.hover:text-red-600]="!post.has_bazed" [class.text-on-surface-variant]="!post.has_bazed" title="Baze">
              <span class="material-symbols-outlined text-[20px]" [style.font-variation-settings]="post.has_bazed ? '\'FILL\' 1' : '\'FILL\' 0'">favorite</span>
              <span class="text-label-sm" [class.text-red-600]="post.has_bazed">{{ post.bazes_count }}</span>
            </button>
            <button (click)="toggleComments(post)" class="flex items-center gap-1.5 text-on-surface-variant hover:text-primary transition-colors" [class.text-primary]="isCommentsOpen(post)">
              <span class="material-symbols-outlined text-[20px]">mode_comment</span>
              <span class="text-label-sm">{{ post.comments_count }}</span>
            </button>
          </div>
        </div>

        <app-post-comments
          *ngIf="isCommentsOpen(post)"
          [post]="post"
          [currentUser]="currentUser"
          [loading]="!!loadingComments[post.id]"
          [isAdmin]="isAdmin()" />
      </article>

      <div *ngIf="isLoadingMore" class="py-4 text-center text-sm text-on-surface-variant dark:text-slate-300">
        A carregar mais publicacoes...
      </div>
    </div>
  </main>

  <app-home-sidebar />
</div>
