<!-- Mock Content Canvas Behind Modal (Low contrast/Blurred) -->
<main class="fixed inset-0 z-0 overflow-hidden pointer-events-none opacity-40 blur-sm">
    <div class="max-w-[640px] mx-auto pt-24 px-4 space-y-stack-lg">
        <!-- Simulated Feed Items -->
        <div class="bg-surface-container-lowest p-6 rounded-xl shadow-sm">
            <div class="flex gap-4 mb-4">
                <div class="w-12 h-12 rounded-full bg-surface-container-high"></div>
                <div class="space-y-2">
                    <div class="w-32 h-4 bg-surface-container-high rounded"></div>
                    <div class="w-24 h-3 bg-surface-container-high rounded"></div>
                </div>
            </div>
            <div class="w-full h-40 bg-surface-container-high rounded-lg mb-4"></div>
            <div class="h-4 bg-surface-container-high rounded w-3/4"></div>
        </div>
    </div>
</main>
<!-- Modal Backdrop -->
<div routerLink="/app/home" class="fixed inset-0 z-[100] bg-on-background/10 dark:bg-black/60 backdrop-blur-md flex items-center justify-center p-4 md:p-gutter cursor-pointer">
    <!-- Comments Modal Container -->
    <div (click)="$event.stopPropagation()" class="bg-surface-container-lowest dark:bg-slate-800 w-full max-w-[640px] max-h-[90vh] flex flex-col rounded-xl shadow-[0_20px_50px_rgba(0,0,0,0.1)] overflow-hidden animate-in fade-in zoom-in-95 duration-300 ease-out-expo cursor-default">
        <!-- Modal Header -->
        <header class="flex items-center justify-between h-16 px-6 border-b border-outline-variant/30 flex-shrink-0">
            <div class="flex items-center gap-2">
                <h2 class="font-display text-h2 text-on-surface dark:text-white">Publicacao</h2>
            </div>
            <button routerLink="/app/home" class="p-2 hover:bg-surface-container dark:hover:bg-slate-700 rounded-full transition-all group active:scale-90 text-on-surface-variant dark:text-slate-400">
                <span class="material-symbols-outlined group-hover:text-on-surface dark:group-hover:text-white"
                    data-icon="close">close</span>
            </button>
        </header>
        <!-- Scrollable Content Area -->
        <div class="flex-1 px-6 py-stack-lg space-y-stack-lg">
            
            <div *ngIf="isLoading" class="flex justify-center p-8">
                <span class="material-symbols-outlined animate-spin text-[32px] text-primary">progress_activity</span>
            </div>

            <ng-container *ngIf="post && !isLoading">
                <!-- Main Original Post -->
                <article class="relative">
                    <div class="flex gap-4">
                        <div class="flex flex-col items-center gap-2">
                            <img alt="Original Poster" class="w-12 h-12 rounded-full object-cover border-2 border-surface" [src]="post.author_avatar || 'assets/default-avatar.png'" />
                            <div class="w-0.5 grow bg-outline-variant/30 rounded-full"></div>
                        </div>
                        <div class="flex-1 pb-stack-md">
                            <div class="flex items-center justify-between mb-1">
                                <span class="font-display font-bold text-on-surface">{{ post.author_name }}</span>
                                <div class="flex items-center gap-3">
                                    <span class="text-label-sm text-on-surface-variant">{{ post.created_at | date:'shortTime' }}</span>
                                    <button *ngIf="post.can_edit" (click)="startPostEdit()" class="text-on-surface-variant hover:text-primary">
                                        <span class="material-symbols-outlined text-[18px]">edit</span>
                                    </button>
                                    <button *ngIf="post.can_delete" (click)="deletePost()" class="text-on-surface-variant hover:text-red-600">
                                        <span class="material-symbols-outlined text-[18px]">delete</span>
                                    </button>
                                </div>
                            </div>
                            <div *ngIf="editingPost; else postContent" class="mb-4 space-y-3">
                                <textarea [(ngModel)]="editingPostContent" class="w-full rounded-xl border border-outline-variant/20 bg-surface-container-lowest p-3" rows="4"></textarea>
                                <div class="flex gap-2 justify-end">
                                    <button (click)="cancelPostEdit()" class="px-4 py-2 rounded-full bg-surface-container text-sm font-semibold">Cancelar</button>
                                    <button (click)="savePostEdit()" class="px-4 py-2 rounded-full bg-primary text-white text-sm font-semibold">Guardar</button>
                                </div>
                            </div>
                            <ng-template #postContent>
                                <p class="font-body-md text-on-surface leading-relaxed mb-4 whitespace-pre-wrap">{{ post.content }}</p>
                            </ng-template>
                            
                            <div *ngIf="post.image_url || post.video_url" class="rounded-xl overflow-hidden mb-4 bg-surface-container-high dark:bg-slate-700 flex justify-center items-center bg-black max-h-[400px]">
                                <img *ngIf="post.image_url" [src]="post.image_url" alt="Post Media" class="w-full h-auto max-h-[400px] object-contain" />
                                <video *ngIf="post.video_url" [src]="post.video_url" autoplay loop muted playsinline class="w-full h-auto max-h-[400px] object-contain"></video>
                            </div>

                            <div class="flex items-center gap-6">
                                <button class="flex items-center gap-1.5 text-on-surface-variant hover:text-primary transition-colors">
                                    <span class="material-symbols-outlined text-[20px]" data-icon="favorite">favorite</span>
                                    <span class="text-label-sm">{{ post.bazes_count }}</span>
                                </button>
                                <button class="flex items-center gap-1.5 text-primary">
                                    <span class="material-symbols-outlined text-[20px]" data-icon="chat_bubble" data-weight="fill" style="font-variation-settings: 'FILL' 1;">chat_bubble</span>
                                    <span class="text-label-sm">{{ post.comments_count }}</span>
                                </button>
                                <button class="flex items-center gap-1.5 text-on-surface-variant hover:text-primary transition-colors">
                                    <span class="material-symbols-outlined text-[20px]" data-icon="share">share</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </article>
                
                <!-- Threaded Replies Section -->
                <div class="space-y-stack-md pt-stack-sm" *ngIf="post.comments && post.comments.length > 0">
                    <div *ngFor="let comment of post.comments" class="flex gap-4">
                        <div class="flex flex-col items-center">
                            <img [alt]="comment.author_name" class="w-10 h-10 rounded-full object-cover" [src]="comment.author_avatar || 'assets/default-avatar.png'" />
                        </div>
                        <div class="flex-1 pb-2">
                            <div class="flex items-center justify-between mb-1">
                                <span class="font-display font-bold text-on-surface text-label-md">{{ comment.author_name }}</span>
                                <span class="text-label-sm text-on-surface-variant">{{ comment.created_at | date:'shortTime' }}</span>
                            </div>
                            <div *ngIf="editingCommentId === comment.id; else commentContent" class="mb-2 space-y-2">
                                <textarea [(ngModel)]="editingCommentBody" class="w-full rounded-xl border border-outline-variant/20 bg-surface-container-lowest p-3 text-sm" rows="3"></textarea>
                                <div class="flex gap-2">
                                    <button (click)="saveCommentEdit(comment)" class="text-label-sm text-primary font-semibold">Guardar</button>
                                    <button (click)="cancelCommentEdit()" class="text-label-sm text-on-surface-variant">Cancelar</button>
                                </div>
                            </div>
                            <ng-template #commentContent>
                                <p class="font-body-md text-on-surface-variant text-sm leading-relaxed mb-2 whitespace-pre-wrap">{{ comment.body }}</p>
                            </ng-template>
                            <div class="flex items-center gap-4">
                                <button class="text-label-sm text-on-surface-variant hover:text-primary">Responder</button>
                                <button *ngIf="comment.can_edit" (click)="startCommentEdit(comment)" class="text-label-sm text-on-surface-variant hover:text-primary">Editar</button>
                                <button *ngIf="comment.can_delete" (click)="deleteComment(comment)" class="text-label-sm text-on-surface-variant hover:text-red-600">Apagar</button>
                                <button class="flex items-center gap-1 text-on-surface-variant hover:text-primary">
                                    <span class="material-symbols-outlined text-[16px]" data-icon="favorite">favorite</span>
                                    <span class="text-label-sm">0</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </ng-container>
        </div>
        <!-- Comment Input Sticky Footer -->
        <footer class="p-6 border-t border-outline-variant/30 bg-surface-container-lowest">
            <div class="flex items-start gap-4">
                <img alt="Your Profile" class="w-10 h-10 rounded-full object-cover shadow-sm"
                    data-alt="High-quality portrait of a user profile for a professional platform, showing a man with an friendly expression in a modern, well-lit apartment. The style is lifestyle-oriented but polished, with soft shadows and high clarity. The color palette is composed of warm neutral tones and bright highlights, creating a welcoming and high-end social media atmosphere."
                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuCxU1M176O15oFeZa6Gdok_VQ6qIl1B0jrLIgSSPoG1z6sxfa-Yf4poHZjnD9Z98BmLYMLhnB1o34Cj6F0D_P2BAA4IU3caUbewEKqO0UFf5igncv3DtIRPchZvTszWCLtdavtagvdSEqhHI2QN9UVbQAyzmO3uUDNCBMWMjmK8axXRZjzyczBXUgc4ZDX5M0iV0rRRk2jN7NFfcddJUtNKzZgPfW7OvtkARkuEbQUzbFIvB-bbdwLG6EsyPl58G14CPzDyhQcQ1_w" />
                <div class="flex-1 relative">
                    <textarea
                        [(ngModel)]="commentText"
                        (keyup.enter)="submitComment()"
                        class="w-full bg-surface-container-low border-none rounded-xl px-4 py-3 text-body-md text-on-surface focus:ring-2 focus:ring-primary/20 placeholder:text-on-surface-variant/50 resize-none overflow-hidden transition-all ease-out-expo"
                        placeholder="Adicionar comentario..." rows="1"></textarea>
                    <div class="mt-3 flex items-center justify-between">
                        <div class="flex items-center gap-2">
                            <button
                                class="p-2 text-on-surface-variant hover:text-primary hover:bg-primary-container/10 rounded-full transition-all">
                                <span class="material-symbols-outlined text-[20px]" data-icon="image">image</span>
                            </button>
                            <button
                                class="p-2 text-on-surface-variant hover:text-primary hover:bg-primary-container/10 rounded-full transition-all">
                                <span class="material-symbols-outlined text-[20px]"
                                    data-icon="sentiment_satisfied">sentiment_satisfied</span>
                            </button>
                        </div>
                        <button
                            (click)="submitComment()" [disabled]="!commentText.trim()"
                            class="bg-primary text-on-primary px-6 py-2 rounded-full font-display font-bold text-label-md shadow-sm hover:brightness-110 active:scale-95 transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                            Publicar
                        </button>
                    </div>
                </div>
            </div>
        </footer>
    </div>
</div>
