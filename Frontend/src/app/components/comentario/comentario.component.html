<div routerLink="/app/home" class="fixed inset-0 z-[100] bg-on-background/10 dark:bg-black/60 backdrop-blur-md flex items-center justify-center p-4 md:p-gutter cursor-pointer">
  <div (click)="$event.stopPropagation()" class="bg-surface-container-lowest dark:bg-slate-800 w-full max-w-[640px] max-h-[90vh] flex flex-col rounded-xl shadow-[0_20px_50px_rgba(0,0,0,0.1)] overflow-hidden cursor-default">
    <header class="flex items-center justify-between h-16 px-6 border-b border-outline-variant/30 flex-shrink-0">
      <h2 class="font-display text-h2 text-on-surface dark:text-white">Publicacao</h2>
      <button routerLink="/app/home" class="p-2 hover:bg-surface-container dark:hover:bg-slate-700 rounded-full transition-all text-on-surface-variant">
        <span class="material-symbols-outlined">close</span>
      </button>
    </header>

    <div class="flex-1 overflow-y-auto px-6 py-stack-lg space-y-stack-lg">
      <div *ngIf="isLoading" class="flex justify-center p-8">
        <span class="material-symbols-outlined animate-spin text-[32px] text-primary">progress_activity</span>
      </div>

      <ng-container *ngIf="post && !isLoading">
        <article class="relative">
          <div class="flex gap-4">
            <div class="flex flex-col items-center gap-2">
              <ng-container *ngIf="post.author_avatar; else postAvatarFallback">
                <img alt="Autor" class="w-12 h-12 rounded-full object-cover border-2 border-surface" [src]="post.author_avatar">
              </ng-container>
              <ng-template #postAvatarFallback>
                <div class="w-12 h-12 rounded-full bg-primary/10 text-primary flex items-center justify-center">
                  <span class="material-symbols-outlined text-[26px]">person</span>
                </div>
              </ng-template>
              <div class="w-0.5 grow bg-outline-variant/30 rounded-full"></div>
            </div>
            <div class="flex-1 pb-stack-md">
              <div class="flex items-center justify-between mb-1">
                <span class="font-display font-bold text-on-surface">{{ post.author_name }}</span>
                <span class="text-label-sm text-on-surface-variant">{{ post.created_at | date:'shortTime' }}</span>
              </div>
              <p class="font-body-md text-on-surface leading-relaxed mb-4 whitespace-pre-wrap">{{ post.content }}</p>

              <div *ngIf="post.image_url || post.video_url" class="rounded-xl overflow-hidden mb-4 bg-black max-h-[400px] flex justify-center items-center">
                <img *ngIf="post.image_url" [src]="post.image_url" alt="Imagem da publicacao" class="w-full h-auto max-h-[400px] object-contain">
                <video *ngIf="post.video_url" [src]="post.video_url" controls class="w-full h-auto max-h-[400px] object-contain"></video>
              </div>

              <div class="flex items-center gap-6">
                <button class="flex items-center gap-1.5 text-on-surface-variant hover:text-primary transition-colors">
                  <span class="material-symbols-outlined text-[20px]">favorite</span>
                  <span class="text-label-sm">{{ post.bazes_count }}</span>
                </button>
                <button class="flex items-center gap-1.5 text-primary">
                  <span class="material-symbols-outlined text-[20px]">chat_bubble</span>
                  <span class="text-label-sm">{{ post.comments_count }}</span>
                </button>
              </div>
            </div>
          </div>
        </article>

        <div class="space-y-stack-md pt-stack-sm" *ngIf="post.comments && post.comments.length > 0">
          <div *ngFor="let comment of post.comments" class="flex gap-4">
            <ng-container *ngIf="comment.author_avatar; else commentAvatarFallback">
              <img [alt]="comment.author_name" class="w-10 h-10 rounded-full object-cover" [src]="comment.author_avatar">
            </ng-container>
            <ng-template #commentAvatarFallback>
              <div class="w-10 h-10 rounded-full bg-primary/10 text-primary flex items-center justify-center flex-shrink-0">
                <span class="material-symbols-outlined text-[22px]">person</span>
              </div>
            </ng-template>
            <div class="flex-1 pb-2">
              <div class="flex items-center justify-between mb-1">
                <div class="min-w-0">
                  <span class="font-display font-bold text-on-surface text-label-md">{{ comment.author_name }}</span>
                  <span class="ml-2 text-label-sm text-on-surface-variant">{{ comment.created_at | date:'shortTime' }}</span>
                </div>
                <div *ngIf="canEditComment(comment) || canDeleteComment(comment)" class="flex items-center gap-1">
                  <button *ngIf="canEditComment(comment) && editingCommentId !== comment.id" (click)="startEditComment(comment)" class="w-8 h-8 rounded-full hover:bg-surface-container text-on-surface-variant hover:text-primary flex items-center justify-center" title="Editar comentario">
                    <span class="material-symbols-outlined text-[18px]">edit</span>
                  </button>
                  <button *ngIf="canDeleteComment(comment)" (click)="deleteComment(comment)" class="w-8 h-8 rounded-full hover:bg-red-50 text-on-surface-variant hover:text-red-600 flex items-center justify-center" title="Eliminar comentario">
                    <span class="material-symbols-outlined text-[18px]">delete</span>
                  </button>
                </div>
              </div>
              <ng-container *ngIf="editingCommentId === comment.id; else commentTextView">
                <textarea [(ngModel)]="editCommentText" class="w-full bg-surface-container-low border-none rounded-xl px-4 py-3 text-sm text-on-surface focus:ring-2 focus:ring-primary/20 resize-none" rows="2"></textarea>
                <div class="mt-2 flex justify-end gap-2">
                  <button (click)="cancelEditComment()" class="px-4 py-2 rounded-full text-label-sm font-bold text-on-surface-variant hover:bg-surface-container">Cancelar</button>
                  <button (click)="saveComment(comment)" [disabled]="!editCommentText.trim()" class="px-4 py-2 rounded-full text-label-sm font-bold bg-primary text-on-primary disabled:opacity-50">Guardar</button>
                </div>
              </ng-container>
              <ng-template #commentTextView>
                <p class="font-body-md text-on-surface-variant text-sm leading-relaxed mb-2 whitespace-pre-wrap">{{ comment.body }}</p>
              </ng-template>
            </div>
          </div>
        </div>
      </ng-container>
    </div>

    <footer class="p-6 border-t border-outline-variant/30 bg-surface-container-lowest">
      <div class="flex items-start gap-4">
        <div class="w-10 h-10 rounded-full bg-primary/10 text-primary flex items-center justify-center flex-shrink-0">
          <span class="material-symbols-outlined text-[22px]">person</span>
        </div>
        <div class="flex-1 relative">
          <textarea [(ngModel)]="commentText" (keyup.enter)="submitComment()" class="w-full bg-surface-container-low border-none rounded-xl px-4 py-3 text-body-md text-on-surface focus:ring-2 focus:ring-primary/20 placeholder:text-on-surface-variant/50 resize-none" placeholder="Adicionar comentario..." rows="1"></textarea>
          <div class="mt-3 flex items-center justify-end">
            <button (click)="submitComment()" [disabled]="!commentText.trim()" class="bg-primary text-on-primary px-6 py-2 rounded-full font-display font-bold text-label-md disabled:opacity-50">
              Comentar
            </button>
          </div>
        </div>
      </div>
    </footer>
  </div>
</div>
